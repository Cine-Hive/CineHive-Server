spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${DB_HOST:db}:5432/${DB_NAME:cinehive_v1}
    username: ${DB_USER:cinehive}
    password: ${DB_PASS:password}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  elasticsearch:
    uris: http://${ES_HOST:es}:9200

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: UTC

  cache:
    redis:
      time-to-live: 10m

management:
  endpoints:
    web:
      exposure:
        include: "*"

app:
  tmdb:
    api-key: ${APP_TMDB_API_KEY:default-key-if-not-set}

logging:
  level:
    com.example.CineHive: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.data.elasticsearch: DEBUG
    org.springframework.data.elasticsearch.core: DEBUG
    org.springframework.data.elasticsearch.client: DEBUG
    org.elasticsearch.client: DEBUG
    org.springframework.data.redis: DEBUG
    org.springframework.batch: DEBUG