spring:
  profiles:
    group:
      "dev": "local"

  web:
    pageable:
      default-page-size: 10
      max-page-size: 50
      one-indexed-parameters: false

  cache:
    type: redis

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    date-format: yyyy-MM-dd'T'HH:mm:ss

  batch:
    jdbc:
      initialize-schema: always
    sql:
      init:
        mode: always
        schema-locations: classpath:org/springframework/batch/core/schema-postgresql.sql

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1 # 기존 스키마를 버전 1로 설정
    baseline-description: "Initial schema"

# =========================================
# 애플리케이션별 맞춤 설정
# =========================================
app:
  cors:
    allowed-origins: http://localhost:8080,http://localhost:3000
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
  admin:
    email: unib335@naver.com
    password: 1234
  jwt:
    # secret-key는 민감 정보이므로, 각 프로필에서 정의
    access-token-expiration: PT30M
    refresh-token-expiration: P30D
  tmdb:
    # api-key는 민감 정보이므로, 각 프로필에서 정의
    base-url: https://api.themoviedb.org/3
    page-size: 20
  review:
    max-page-size: 50
    default-page-size: 10
  security:
    login:
      max-attempts: 5
      lockout-duration: PT15M
      attempt-window: PT1H
    password:
      history-size: 1
      reset:
        token-expiry: PT30M
    rate-limit:
      forgot-password:
        email-window: PT1M
        email-max-requests: 2
        ip-window: PT1H
        ip-max-requests: 20

# =========================================
# 외부 서비스 연동 설정 (공통)
# =========================================
springdoc:
  version: V.1.0.0
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always # health 체크 시 상세 정보를 항상 보여줍니다.