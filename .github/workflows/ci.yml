name: CI Pipeline

on:
  push:
    branches:
      - feature/action-ci-setup  
  pull_request:
    branches:
      - feature/action-ci-setup 

jobs:
  build:
    runs-on: ubuntu-latest  # GitHub Actions는 우분투 환경에서 실행

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v2  # GitHub 리포지토리의 코드를 체크아웃


      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17' 


      - name: Cache Gradle dependencies
        uses: actions/cache@v2
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-


      - name: Build with Gradle
        run: ./gradlew build 


      - name: Run tests
        run: ./gradlew test 
        env:
          SPRING_PROFILES_ACTIVE: test  
          

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v2
        with:
          name: test-results
          path: build/test-results/test
