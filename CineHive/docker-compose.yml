services:
  # 1. Spring Boot 애플리케이션 서비스
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinehive-app
    ports:
      - "8081:8081"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      es:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SERVER_PORT=8081
      # DB 접속 정보
      - DB_HOST=db
      - DB_NAME=cinehive_v1
      - DB_USER=cinehive
      - DB_PASS=password
      # Redis, ES 접속 정보
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ES_HOST=es

  # 2. PostgreSQL 서비스
  db:
    image: postgres:15-alpine
    container_name: cinehive-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cinehive_v1
      - POSTGRES_USER=cinehive
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinehive -d cinehive_v1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Redis 서비스
  redis:
    image: redis:7-alpine
    container_name: cinehive-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Elasticsearch 서비스
  es:
    build:
      context: .
      dockerfile: Dockerfile.elasticsearch
    container_name: cinehive-es
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    volumes:
      - es-data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=50s"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 60s

  # 5. Kibana
  kibana:
    image: kibana:8.13.4
    container_name: cinehive-kibana
    ports:
      - "5601:5601"
    depends_on:
      - es
    environment:
      - ELASTICSEARCH_HOSTS=http://es:9200
      - xpack.security.enabled=false

volumes:
  postgres-db-data:
  redis-data:
  es-data: