spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      # password: ${REDIS_PASS}

  elasticsearch:
    uris: http://${ES_HOST}:9200

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  cache:
    redis:
      time-to-live: 60m

  batch:
    jdbc:
      initialize-schema: never
    sql:
      init:
        mode: never

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline-on-migrate: false # 운영 DB는 Flyway가 처음부터 관리해야 함


app:
  jwt:
    secret-key: ${JWT_SECRET}
  tmdb:
    api-key: ${TMDB_API_KEY}

logging:
  level:
    com.example.CineHive: INFO