name: Java CI with Gradle

on:
  push:
    branches: [ "feature/action-ci-setup" ]
  pull_request:
    branches: [ "feature/action-ci-setup" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: 12341234
          MYSQL_DATABASE: cinehive
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 --protocol=tcp -uroot -p12341234 || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Give gradlew execute permission
      run: chmod +x ./gradlew

    - name: Wait for MariaDB to be ready
      run: |
        echo "Waiting for MariaDB to be ready..."
        for i in {1..30}; do
          nc -zv 127.0.0.1 3306 && echo "MariaDB is up!" && exit 0
          echo -n "."
          sleep 2
        done
        echo "MariaDB did not start in time!" && exit 1

    - name: Debug Environment Variables
      run: printenv | grep SPRING

    - name: Build with Gradle Wrapper
      run: ./gradlew build --stacktrace

    - name: Run tests
      run: ./gradlew clean test --no-daemon --stacktrace --info
      env:
        SPRING_DATASOURCE_URL: jdbc:mariadb://127.0.0.1:3306/cinehive?useUnicode=true&characterEncoding=utf8mb4
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: 12341234
        SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
        SPRING_JPA_HIBERNATE_DDL_AUTO: update
        SPRING_JPA_SHOW_SQL: "true"
        SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MariaDBDialect
